name: Ažuriraj Telegram Prvi glas M3U
on:
  schedule:
    - cron: '*/30 5-8 * * *'  # SVAKIH 30 MIN IZMEĐU 6:00-9:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Instaliraj xml2js za RSS
      run: |
        npm init -y
        npm install xml2js
    
    - name: Generiraj Telegram M3U
      run: node update-telegram.js
    
    - name: Commit i push
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Telegram Prvi glas: $(date +%d.%m.%Y\ %H:%M)"
        file_pattern: 'telegram-prvi-glas.m3u'
