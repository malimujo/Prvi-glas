name: Ažuriraj Prvi glas M3U
on:
  schedule:
    - cron: '0 7 * * *'    # 8:00 CET
    - cron: '0 11 * * *'   # 12:00 CET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Instaliraj Puppeteer (SAMO ZA TELEGRAM;)
      run: |
        npm init -y
        npm install puppeteer
        npx puppeteer browsers install chrome
    
    - name: Generiraj Prvi glas M3U
      run: node update-m3u.js     # ← TVOJ PUPETEER SKRIPTI ZA TELEGRAM!
    
    - name: Commit M3U
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Drugi dio dana: $(date +%d.%m.%Y\ %H:%M)"
        file_pattern: 'Prvi_glas.m3u'
